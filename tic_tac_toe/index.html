<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <main class="game">
    <header class="game__header">
      <p class="eyebrow">Tres en raya</p>
      <h1>Tic Tac Toe</h1>
      <p class="subtitle">Consigue tres símbolos en línea para ganar.</p>
    </header>

    <section class="scoreboard">
      <article class="score score--x">
        <span class="score__player">Jugador X</span>
        <strong id="score-x" class="score__number">0</strong>
      </article>

      <article class="score score--draw">
        <span class="score__player">Empates</span>
        <strong id="score-draw" class="score__number">0</strong>
      </article>

      <article class="score score--o">
        <span class="score__player">Jugador O</span>
        <strong id="score-o" class="score__number">0</strong>
      </article>
    </section>

    <section class="game__panel">
      <p id="status" class="status">Turno del jugador X</p>

      <div id="board" class="board">
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
      </div>

      <div class="actions">
        <button id="restart-button" class="button button--primary">
          Nueva ronda
        </button>

        <button id="reset-button" class="button button--secondary">
          Reiniciar marcador
        </button>
      </div>
    </section>
  </main>
</body>
</html>
